<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bevy_test04 - Single Pong</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08080d;
      color: #e8eef8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: #08080d;
      z-index: 10;
    }

    #loading.hidden {
      display: none;
    }

    canvas {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>bevy_test04 - Single Pong</h1>
    <p>Loading WASM...</p>
    <p>Controls: W/S or Arrow Up/Down, Options: F10</p>
  </div>

  <script type="module">
    import init from './bevy_test04.js';

    try {
      await init();
      document.getElementById('loading')?.classList.add('hidden');
    } catch (error) {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.innerHTML = `<h1>Failed to load</h1><pre>${String(error)}</pre>`;
      }
      console.error(error);
    }
  </script>
</body>
</html>
